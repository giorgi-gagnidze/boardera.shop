name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Vite GitHub Pages Deployer
        uses: skywarth/vite-github-pages-deployer@v1.5.0
        with:
          public_base_path: /your-repo-name/
          build_path: ./dist
          install_phase_node_env: dev
          build_phase_node_env: production
```

---

## Step 3 — Enable GitHub Pages in repo settings

1. Go to your repo on GitHub → **Settings** → **Pages**
2. Under **Source**, select **GitHub Actions**
3. Save

---

## Step 4 — Push and trigger the workflow

Commit and push the two changed files (`vite.config.ts` and the workflow YAML) to `main`. The Actions workflow will run automatically, build your project, and publish it.

Your site will be live at:
```
https://<your-username>.github.io/<your-repo-name>/
